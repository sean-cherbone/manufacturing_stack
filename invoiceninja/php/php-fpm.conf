; ── PHP-FPM pool tuning for Invoice Ninja ────────────────────────────────────
; www pool (default). These settings tune the process manager for a
; single-instance local/production deployment.

[www]
; Dynamic process manager: starts pm.start_servers workers, scales between
; pm.min_spare_servers and pm.max_spare_servers based on load.
pm                    = dynamic
pm.max_children       = 20
pm.start_servers      = 4
pm.min_spare_servers  = 2
pm.max_spare_servers  = 8

; Recycle workers after handling this many requests to prevent memory leaks.
pm.max_requests       = 500

