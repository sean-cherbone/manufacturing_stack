# Invoice Ninja — Accounting & Invoicing
# Project name: invoiceninja  (managed by start.sh / stop.sh)
#
# Services:
#   in-db      — MySQL 8 (application database)
#   in-redis   — Redis (sessions, cache, queue backend)
#   in-app     — PHP-FPM application container (runs migrations + queue workers)
#   in-nginx   — NGINX reverse proxy (static assets + PHP-FPM pass-through)
#
# Nginx serves on host port LISTEN_PORT (default 8092).
# PHP-FPM is internal only — never exposed to the host.
# All custom php.ini, php-fpm, supervisor, and nginx configs are bind-mounted
# from the local config directories so they can be tuned without rebuilding.

networks:
  invoiceninja:

volumes:
  in_mysql:
  in_redis:
  in_public:
  in_storage:

services:

  # ── Database ──────────────────────────────────────────────────────────────────
  in-db:
    image: mysql:8.0
    container_name: in_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ninja}
      MYSQL_USER: ${DB_USERNAME:-ninja}
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - in_mysql:/var/lib/mysql
    networks:
      - invoiceninja
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u${DB_USERNAME:-ninja}", "-p${DB_PASSWORD}"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Cache / sessions / queue ───────────────────────────────────────────────────
  in-redis:
    image: redis:7-alpine
    container_name: in_redis
    restart: unless-stopped
    volumes:
      - in_redis:/data
    networks:
      - invoiceninja
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application (PHP-FPM + queue workers + scheduler) ─────────────────────────
  in-app:
    image: invoiceninja/invoiceninja-debian:${IN_TAG:-latest}
    pull_policy: if_not_present
    container_name: in_app
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./php/php.ini:/usr/local/etc/php/conf.d/invoiceninja.ini:ro
      - ./php/php-fpm.conf:/usr/local/etc/php-fpm.d/invoiceninja.conf:ro
      - ./supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
      - in_public:/var/www/html/public
      - in_storage:/var/www/html/storage
    networks:
      - invoiceninja
    depends_on:
      in-db:
        condition: service_healthy
      in-redis:
        condition: service_healthy

  # ── Web / reverse proxy ────────────────────────────────────────────────────────
  in-nginx:
    image: nginx:1.27-alpine
    container_name: in_nginx
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-8092}:80"
    volumes:
      - ./nginx/invoiceninja.conf:/etc/nginx/conf.d/invoiceninja.conf:ro
      - ./nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro
      - in_public:/var/www/html/public:ro
      - in_storage:/var/www/html/storage:ro
    networks:
      - invoiceninja
    depends_on:
      in-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthcheck"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
