# ── Laravel / Invoice Ninja virtual host ──────────────────────────────────────
# https://laravel.com/docs/deployment#nginx
server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;

    index index.php;
    charset utf-8;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Laravel front controller ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Healthcheck endpoint (used by docker healthcheck) ─────────────────────
    location = /healthcheck {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.php;

    # ── PHP-FPM pass-through ─────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   in-app:9000;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Forward real client IP when behind another proxy
        fastcgi_param  HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
    }

    # ── Block hidden files (except .well-known for ACME) ─────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
