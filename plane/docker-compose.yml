# Plane — Project Management
# Project name: plane  (managed by start.sh / stop.sh)
#
# Services:
#   plane-db      — PostgreSQL 15.7 (application database)
#   plane-redis   — Valkey 7.2 (cache and Celery results backend)
#   plane-mq      — RabbitMQ 3.13 (Celery message broker)
#   plane-minio   — MinIO (S3-compatible object storage for file uploads)
#   migrator      — one-shot: Django database migrations
#   api           — Django/Gunicorn API backend
#   worker        — Celery worker (background jobs)
#   beat-worker   — Celery beat (scheduled tasks)
#   web           — React frontend
#   space         — Public spaces / embeddable pages
#   admin         — Instance administration panel
#   live          — Real-time collaboration server
#   proxy         — makeplane/plane-proxy (routes all traffic); host port 8100
#
# The official compose uses Docker Swarm deploy syntax; this file converts
# that to plain Compose (restart:) and adds healthchecks on all stateful
# services for proper startup ordering.

networks:
  plane:

volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
  uploads:
  logs_api:
  logs_worker:
  logs_beat_worker:
  logs_migrator:
  proxy_config:
  proxy_data:

# ── Environment anchors (mirrors official v1.3.0 release compose) ──────────────
x-db-env: &db-env
  PGHOST: ${PGHOST:-plane-db}
  PGDATABASE: ${PGDATABASE:-plane}
  POSTGRES_USER: ${POSTGRES_USER:-plane}
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  POSTGRES_DB: ${POSTGRES_DB:-plane}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  PGDATA: ${PGDATA:-/var/lib/postgresql/data}

x-redis-env: &redis-env
  REDIS_HOST: ${REDIS_HOST:-plane-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_URL: "${REDIS_URL}"

x-minio-env: &minio-env
  MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID}"
  MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY}"

x-aws-s3-env: &aws-s3-env
  AWS_REGION: ${AWS_REGION:-}
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://plane-minio:9000}
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}

x-proxy-env: &proxy-env
  APP_DOMAIN: ${APP_DOMAIN:-localhost}
  FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
  BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
  SITE_ADDRESS: ${SITE_ADDRESS:-:80}

x-mq-env: &mq-env
  RABBITMQ_HOST: ${RABBITMQ_HOST:-plane-mq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
  RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-plane}

x-live-env: &live-env
  API_BASE_URL: ${API_BASE_URL:-http://api:8000}
  LIVE_SERVER_SECRET_KEY: "${LIVE_SERVER_SECRET_KEY}"

x-app-env: &app-env
  WEB_URL: "${WEB_URL}"
  DEBUG: ${DEBUG:-0}
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
  USE_MINIO: ${USE_MINIO:-1}
  DATABASE_URL: "${DATABASE_URL}"
  SECRET_KEY: "${SECRET_KEY}"
  AMQP_URL: "${AMQP_URL}"
  API_KEY_RATE_LIMIT: ${API_KEY_RATE_LIMIT:-60/minute}
  MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-0}
  LIVE_SERVER_SECRET_KEY: "${LIVE_SERVER_SECRET_KEY}"

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  plane-db:
    image: postgres:15.7-alpine
    container_name: plane_db
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - plane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plane} -d ${POSTGRES_DB:-plane}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache / results backend ───────────────────────────────────────────────────
  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    container_name: plane_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - plane
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Message queue ─────────────────────────────────────────────────────────────
  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane_mq
    restart: unless-stopped
    environment:
      <<: *mq-env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - plane
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      start_period: 20s
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Object storage ────────────────────────────────────────────────────────────
  plane-minio:
    image: minio/minio:latest
    pull_policy: if_not_present
    container_name: plane_minio
    command: server /export --console-address ":9090"
    restart: unless-stopped
    environment:
      <<: *minio-env
    volumes:
      - uploads:/export
    networks:
      - plane
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ─────────────────────────────────────────────
  create-bucket:
    image: minio/mc:latest
    pull_policy: if_not_present
    container_name: plane_create_bucket
    entrypoint:
      - /bin/sh
      - -c
      - "mc mb myminio/${AWS_S3_BUCKET_NAME:-uploads} --ignore-existing && echo 'Bucket ready.'"
    environment:
      MC_HOST_myminio: "http://${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}@plane-minio:9000"
    networks:
      - plane
    depends_on:
      plane-minio:
        condition: service_healthy
    restart: on-failure

  # ── Database migrations (one-shot) ────────────────────────────────────────────
  migrator:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_migrator
    command: ./bin/docker-entrypoint-migrator.sh
    restart: on-failure
    volumes:
      - logs_migrator:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks:
      - plane
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy

  # ── API backend ───────────────────────────────────────────────────────────────
  api:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_api
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    volumes:
      - logs_api:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks:
      - plane
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      create-bucket:
        condition: service_completed_successfully

  # ── Background workers ────────────────────────────────────────────────────────
  worker:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_worker
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    volumes:
      - logs_worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks:
      - plane
    depends_on:
      - api

  beat-worker:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_beat_worker
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    volumes:
      - logs_beat_worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks:
      - plane
    depends_on:
      - api

  # ── Frontend services ─────────────────────────────────────────────────────────
  web:
    image: makeplane/plane-frontend:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_web
    restart: unless-stopped
    networks:
      - plane
    depends_on:
      - api
      - worker

  space:
    image: makeplane/plane-space:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_space
    restart: unless-stopped
    networks:
      - plane
    depends_on:
      - api
      - worker
      - web

  admin:
    image: makeplane/plane-admin:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_admin
    restart: unless-stopped
    networks:
      - plane
    depends_on:
      - api
      - web

  # ── Real-time collaboration ───────────────────────────────────────────────────
  live:
    image: makeplane/plane-live:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_live
    restart: unless-stopped
    environment:
      <<: [*live-env, *redis-env]
    networks:
      - plane
    depends_on:
      - api
      - web

  # ── Reverse proxy — host port 8100 ────────────────────────────────────────────
  proxy:
    image: makeplane/plane-proxy:${APP_RELEASE:-v1.3.0}
    pull_policy: if_not_present
    container_name: plane_proxy
    restart: unless-stopped
    environment:
      <<: *proxy-env
    ports:
      - "${LISTEN_HTTP_PORT:-8100}:80"
    volumes:
      - proxy_config:/config
      - proxy_data:/data
    networks:
      - plane
    depends_on:
      - web
      - api
      - space
      - admin
      - live
