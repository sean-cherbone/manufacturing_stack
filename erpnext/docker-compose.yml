# ERPNext — Manufacturing Tools stack
# Project name: frappe_mfg  (managed by start.sh / stop.sh)
#
# Services:
#   db            — MariaDB 11.8 (application database)
#   redis-cache   — Redis for page/object caching
#   redis-queue   — Redis for background job queues + Socket.IO (persisted)
#   configurator  — one-shot: writes common_site_config.json
#   create-site   — one-shot: creates the ERPNext site on first run (idempotent)
#   backend       — ERPNext Python WSGI (gunicorn)
#   websocket     — Socket.IO real-time server (node)
#   queue-short   — background worker: short/default queues
#   queue-long    — background worker: long/default/short queues
#   scheduler     — cron-style task scheduler (bench schedule)
#   frontend      — nginx reverse proxy; exposed on host port 8082

x-erpnext-image: &erpnext_image
  image: frappe/erpnext:${ERPNEXT_VERSION}
  pull_policy: if-not-present

x-site-volumes: &site_volumes
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*erpnext_image, *site_volumes, *depends_on_configurator]
  restart: unless-stopped

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.8
    container_name: frappe_mfg_db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis-cache:
    image: redis:6.2-alpine
    container_name: frappe_mfg_redis_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-queue:
    image: redis:6.2-alpine
    container_name: frappe_mfg_redis_queue
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Configuration (one-shot) ───────────────────────────────────────────────────
  configurator:
    <<: [*erpnext_image, *site_volumes]
    container_name: frappe_mfg_configurator
    platform: linux/amd64
    restart: on-failure
    entrypoint: ["bash", "-c"]
    command:
      - |
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  # ── Site bootstrap (one-shot, idempotent) ────────────────────────────────────
  create-site:
    <<: [*erpnext_image, *site_volumes]
    container_name: frappe_mfg_create_site
    platform: linux/amd64
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - |
        if [ -f sites/${SITE_NAME}/site_config.json ]; then
          echo "Site '${SITE_NAME}' already exists — skipping creation.";
          exit 0;
        fi;
        echo "Waiting for common_site_config.json to be ready...";
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]]; do
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "Timed out waiting for common_site_config.json"; exit 1;
          fi;
        done;
        echo "Creating site '${SITE_NAME}'...";
        bench new-site ${SITE_NAME} \
          --mariadb-user-host-login-scope='%' \
          --db-root-password ${DB_PASSWORD} \
          --admin-password ${ADMIN_PASSWORD} \
          --install-app erpnext \
          --set-default;
        echo "Site '${SITE_NAME}' created successfully.";
    environment:
      SITE_NAME: ${SITE_NAME:-manufacturing}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  # ── Application backend ───────────────────────────────────────────────────────
  backend:
    <<: *backend_defaults
    container_name: frappe_mfg_backend
    platform: linux/amd64

  websocket:
    <<: [*erpnext_image, *site_volumes, *depends_on_configurator]
    container_name: frappe_mfg_websocket
    platform: linux/amd64
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]

  queue-short:
    <<: *backend_defaults
    container_name: frappe_mfg_queue_short
    platform: linux/amd64
    command: ["bench", "worker", "--queue", "short,default"]

  queue-long:
    <<: *backend_defaults
    container_name: frappe_mfg_queue_long
    platform: linux/amd64
    command: ["bench", "worker", "--queue", "long,default,short"]

  scheduler:
    <<: *backend_defaults
    container_name: frappe_mfg_scheduler
    platform: linux/amd64
    command: ["bench", "schedule"]

  # ── Frontend (nginx) — host port 8082 ─────────────────────────────────────────
  frontend:
    <<: [*erpnext_image, *site_volumes]
    container_name: frappe_mfg_frontend
    platform: linux/amd64
    restart: unless-stopped
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-manufacturing}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    ports:
      - "${HTTP_PUBLISH_PORT:-8082}:8080"
    depends_on:
      - backend
      - websocket

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:
