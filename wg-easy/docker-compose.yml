# wg-easy — WireGuard VPN with Web UI
# Project name: wg-easy  (managed by start.sh / stop.sh)
#
# Exposes:
#   51820/udp — WireGuard VPN endpoint (clients connect here)
#   51821/tcp — Web UI for managing clients
#
# Requires kernel capabilities NET_ADMIN and SYS_MODULE, plus sysctl
# overrides for IP forwarding. These are standard WireGuard requirements.
#
# ⚠ WSL2 note: SYS_MODULE and certain sysctls may be unavailable under WSL2.
#   Remove `SYS_MODULE` from cap_add and the net.ipv6 sysctls if running on WSL2.
#
# Web UI: http://localhost:8820

volumes:
  wg_data:

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    networks:
      wg:
        ipv4_address: 10.42.42.42
        ipv6_address: fdcc:ad94:bacf:61a3::2a
    environment:
      # ── Web UI ────────────────────────────────────────────────────────────────
      HOST: "0.0.0.0"
      INSECURE: "true"
      # ── First-run unattended setup ────────────────────────────────────────────
      # All INIT_* variables must be set together. Remove them after first start
      # once the admin account and WireGuard config are persisted to the volume.
      INIT_ENABLED: ${INIT_ENABLED:-false}
      INIT_USERNAME: ${INIT_USERNAME:-admin}
      INIT_PASSWORD: ${INIT_PASSWORD:-}
      INIT_HOST: ${INIT_HOST:-}
      INIT_PORT: ${INIT_PORT:-51820}
      INIT_DNS: ${INIT_DNS:-1.1.1.1,8.8.8.8}
      INIT_IPV4_CIDR: ${INIT_IPV4_CIDR:-10.8.0.0/24}
      INIT_IPV6_CIDR: ${INIT_IPV6_CIDR:-fd42::/64}
      INIT_ALLOWED_IPS: ${INIT_ALLOWED_IPS:-0.0.0.0/0,::/0}
    volumes:
      - wg_data:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WG_UDP_PORT:-51820}:51820/udp"
      - "0.0.0.0:${WG_UI_PORT:-8820}:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

networks:
  wg:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24
        - subnet: fdcc:ad94:bacf:61a3::/64
